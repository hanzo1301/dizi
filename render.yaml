services:
  - type: web
    name: dizi-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FOTKY_FOLDER_ID
        sync: false
      - key: EVENTS_FOLDER_ID
        sync: false
      - key: GOOGLE_DRIVE_PROJECT_ID
        sync: false
      - key: GOOGLE_DRIVE_PRIVATE_KEY_ID
        sync: false
      - key: GOOGLE_DRIVE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: BASE_URL
        fromDatabase:
          name: dizi-backend
          property: url
